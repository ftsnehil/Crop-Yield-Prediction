<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crop Yield Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background: url('https://static.vecteezy.com/system/resources/thumbnails/031/696/655/small_2x/sprawling-agricultural-farm-featuring-fields-of-crops-ai-generated-photo.jpg') no-repeat center center fixed;
        background-size: cover;
        font-family: 'Segoe UI', sans-serif;
        color: white;
      }

      .overlay {
        background-color: rgba(0, 0, 0, 0.6);
        min-height: 100vh;
        padding: 3rem 0;
      }

      .card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        padding: 2rem;
        color: #000;
      }

      .form-control {
        border-radius: 10px;
      }

      .btn-custom {
        background-color: #198754;
        color: white;
        border-radius: 30px;
        padding: 0.75rem 1.5rem;
        font-size: 1.1rem;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="container">
        <h1 class="text-center text-warning mb-4 display-5 fw-bold">🌾 Crop Yield Prediction System</h1>
        
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="card">
              <h2 class="text-center text-success mb-4">Enter Agricultural Details</h2>

              {% if error %}
              <div class="alert alert-danger alert-dismissible fade show" role="alert">
                {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
              {% endif %}

              <form action="/predict" method="post">
                <div class="mb-3">
                  <label for="Year" class="form-label">Year</label>
                  <input type="number" class="form-control" name="Year" step="any" value="2013">
                </div>
                <div class="mb-3">
                  <label for="average_rain_fall_mm_per_year" class="form-label">Average Rainfall (mm/year)</label>
                  <input type="number" class="form-control" name="average_rain_fall_mm_per_year" step="any">
                </div>
                <div class="mb-3">
                  <label for="pesticides_tonnes" class="form-label">Pesticides Used (tonnes)</label>
                  <input type="number" class="form-control" name="pesticides_tonnes" step="any">
                </div>
                <div class="mb-3">
                  <label for="avg_temp" class="form-label">Average Temperature (°C)</label>
                  <input type="number" class="form-control" name="avg_temp" step="any">
                </div>
                <div class="mb-3">
                  <label for="Area" class="form-label">Area </label>
                  <input type="text" class="form-control" name="Area">
                </div>
                <div class="mb-4">
                  <label for="Item" class="form-label">Crop Item </label>
                  <input type="text" class="form-control" name="Item">
                </div>
                <button type="submit" class="btn btn-custom">🌱 Predict Yield</button>
              </form>

              {% if prediction %}
                <div class="mt-4 text-center">
                  <h3 class="text-success">🌾 Predicted Yield:</h3>
                  <h2 class="text-dark">{{ prediction }} hg/ha</h2>

                </div>
              {% endif %}
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
